<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('My Events')}"></head>
<body>

<header th:replace="~{fragments/layout :: header}"></header>

<main class="container page-content">
    
    <div class="section-header">
        <h2><i class="fas fa-calendar-check"></i> My Registered Events</h2>
    </div>

    <div th:if="${param.error}" class="alert alert-error" style="margin-bottom: 20px;">
        <i class="fas fa-exclamation-circle"></i> <span th:text="${param.error}"></span>
    </div>

    <div class="events-grid" th:if="${not #lists.isEmpty(registrations)}">
        <div class="event-card" th:each="reg : ${registrations}">
            <div class="card-header" style="background: rgba(16, 185, 129, 0.2);">
                <span class="badge" th:text="${reg.event.type}" style="background: #10b981;">Type</span>
                <span class="date"><i class="far fa-calendar"></i> <span th:text="${#temporals.format(reg.event.eventDate, 'MMM dd, yyyy')}">Date</span></span>
            </div>
            <div class="card-body">
                <h3 th:text="${reg.event.title}">Event Title</h3>
                <p class="dept"><i class="fas fa-building"></i> <span th:text="${reg.event.department}">Department</span></p>
                <div style="margin-top: 15px; font-size: 0.9rem;">
                    <p><strong>Registered on:</strong> <span th:text="${#temporals.format(reg.registrationDate, 'MMM dd, yyyy HH:mm')}">Date</span></p>
                    <p th:if="${reg.payment != null}">
                        <strong>Payment:</strong> <span th:text="${reg.payment.status}" th:style="${reg.payment.status == 'SUCCESS' ? 'color: #10b981;' : 'color: #ef4444;'}">Status</span>
                    </p>
                </div>
            </div>
            <div class="card-footer" style="display: flex; gap: 10px;">
                <a th:href="@{/event/{id}(id=${reg.event.id})}" class="btn-outline" style="flex: 1; text-align: center;">Details</a>
                
                <a th:if="${reg.payment == null || reg.payment.status != 'SUCCESS'}" 
                   th:href="@{/payment/checkout/{id}(id=${reg.id})}" 
                   class="btn-primary" style="flex: 1; text-align: center; background: #f59e0b; border-color: #f59e0b;">Pay Now</a>
                
                <a th:if="${reg.ticket != null}" 
                   th:href="@{/ticket/view/{id}(id=${reg.ticket.id})}" 
                   class="btn-primary" style="flex: 1; text-align: center;"><i class="fas fa-ticket-alt"></i> Ticket</a>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(registrations)}" class="empty-state">
        <i class="fas fa-calendar-times fa-4x"></i>
        <h3>No Events Yet</h3>
        <p>You haven't registered for any events yet. Browse our events to find something interesting!</p>
        <a th:href="@{/events}" class="btn-primary" style="margin-top: 15px;">Browse Events</a>
    </div>

</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
