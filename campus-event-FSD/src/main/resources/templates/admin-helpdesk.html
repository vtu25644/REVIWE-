<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Admin Help Desk')}"></head>
<body>

<header th:replace="~{fragments/layout :: header}"></header>

<main class="container page-content">
    
    <div class="section-header">
        <h2><i class="fas fa-life-ring"></i> Manage Help Requests</h2>
        <a th:href="@{/admin/dashboard}" class="btn-outline">Back to Dashboard</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" style="margin-bottom: 20px;">
        <i class="fas fa-check-circle"></i> <span th:text="${successMessage}"></span>
    </div>

    <div class="glass-panel">
        <table style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
                <tr style="border-bottom: 1px solid rgba(255,255,255,0.1);">
                    <th style="padding: 15px;">ID</th>
                    <th style="padding: 15px;">User</th>
                    <th style="padding: 15px;">Title</th>
                    <th style="padding: 15px;">Category</th>
                    <th style="padding: 15px;">Date</th>
                    <th style="padding: 15px;">Status</th>
                    <th style="padding: 15px;">Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="req : ${requests}" style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                    <td style="padding: 15px;" th:text="${req.id}">1</td>
                    <td style="padding: 15px;" th:text="${req.user.name} + ' (' + ${req.user.username} + ')'">User</td>
                    <td style="padding: 15px;" th:text="${req.title}">Title</td>
                    <td style="padding: 15px;" th:text="${req.category}">Category</td>
                    <td style="padding: 15px;" th:text="${#temporals.format(req.createdAt, 'MMM dd, HH:mm')}">Date</td>
                    <td style="padding: 15px;">
                        <span class="badge" th:text="${req.status}" 
                              th:style="${req.status == 'RESOLVED' ? 'background: #10b981;' : (req.status == 'IN_PROGRESS' ? 'background: #f59e0b;' : 'background: #3b82f6;')}">Status</span>
                    </td>
                    <td style="padding: 15px;">
                        <form th:action="@{/helpdesk/update-status/{id}(id=${req.id})}" method="post" style="display: flex; gap: 10px;">
                            <select name="status" class="form-control" style="padding: 5px; height: auto;">
                                <option value="OPEN" th:selected="${req.status == 'OPEN'}">OPEN</option>
                                <option value="IN_PROGRESS" th:selected="${req.status == 'IN_PROGRESS'}">IN_PROGRESS</option>
                                <option value="RESOLVED" th:selected="${req.status == 'RESOLVED'}">RESOLVED</option>
                            </select>
                            <button type="submit" class="btn-primary" style="padding: 5px 10px;">Update</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(requests)}">
                    <td colspan="7" style="padding: 20px; text-align: center; color: #888;">No help requests found.</td>
                </tr>
            </tbody>
        </table>
    </div>

</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
