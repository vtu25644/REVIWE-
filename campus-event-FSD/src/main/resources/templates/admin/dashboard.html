<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Admin Dashboard')}"></head>
<body>

<header th:replace="~{fragments/layout :: header}"></header>

<main class="container page-content">
    
    <div class="dashboard-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
        <h2><i class="fas fa-chart-line"></i> Admin Dashboard</h2>
        <div style="display: flex; gap: 10px;">
            <a th:href="@{/helpdesk}" class="btn-outline"><i class="fas fa-life-ring"></i> View Help Requests</a>
            <a th:href="@{/admin/event/new}" class="btn-primary"><i class="fas fa-plus"></i> Create New Event</a>
        </div>
    </div>

    <!-- Stats summary -->
    <div style="display: flex; gap: 20px; margin-top: 20px; margin-bottom: 20px;">
        <div class="glass-panel" style="flex: 1; text-align: center; padding: 20px;">
            <i class="fas fa-calendar-alt fa-3x" style="color: var(--primary); margin-bottom: 10px;"></i>
            <h3>Total Events</h3>
            <h1 style="font-size: 3rem; margin: 0;" th:text="${totalEvents}">0</h1>
        </div>
        <div class="glass-panel" style="flex: 1; text-align: center; padding: 20px;">
            <i class="fas fa-users fa-3x" style="color: #10b981; margin-bottom: 10px;"></i>
            <h3>Total Registrations</h3>
            <h1 style="font-size: 3rem; margin: 0;" th:text="${totalRegistrations}">0</h1>
        </div>
    </div>

    <div th:if="${param.success}" class="alert alert-success" style="margin-bottom: 20px;">Event created successfully!</div>
    <div th:if="${param.updated}" class="alert alert-success" style="margin-bottom: 20px;">Event updated successfully!</div>
    <div th:if="${param.deleted}" class="alert alert-success" style="margin-bottom: 20px;">Event deleted successfully!</div>

    <div class="glass-panel" style="margin-bottom: 20px; padding: 15px;">
        <form th:action="@{/admin/dashboard}" method="get" style="display: flex; gap: 10px; flex-wrap: wrap;">
            <input type="text" name="search" th:value="${search}" placeholder="Search events..." class="form-control" style="flex: 1; min-width: 200px;">
            <button type="submit" class="btn-primary">Search</button>
            <a th:href="@{/admin/dashboard}" class="btn-outline">Clear</a>
        </form>
    </div>

    <div class="admin-table-container glass-panel">
        <table class="admin-table" style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
                <tr style="border-bottom: 1px solid rgba(255,255,255,0.1);">
                    <th style="padding: 15px;">ID</th>
                    <th style="padding: 15px;">Title</th>
                    <th style="padding: 15px;">Date</th>
                    <th style="padding: 15px;">Department</th>
                    <th style="padding: 15px;">Registrations</th>
                    <th style="padding: 15px;">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="event : ${events}" style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                    <td style="padding: 15px;" th:text="${event.id}">1</td>
                    <td style="padding: 15px;" th:text="${event.title}">Title</td>
                    <td style="padding: 15px;" th:text="${#temporals.format(event.eventDate, 'MMM dd, yyyy')}">Date</td>
                    <td style="padding: 15px;" th:text="${event.department}">Dept</td>
                    <td style="padding: 15px;">
                        <div class="capacity-info sm">
                            <span th:text="${event.registeredCount}">0</span> / <span th:text="${event.capacity}">100</span>
                        </div>
                    </td>
                    <td style="padding: 15px;" class="actions">
                        <a th:href="@{/admin/event/edit/{id}(id=${event.id})}" class="btn-icon edit" title="Edit"><i class="fas fa-edit"></i></a>
                        <a th:href="@{/admin/event/delete/{id}(id=${event.id})}" class="btn-icon delete" title="Delete" onclick="return confirm('Are you sure you want to delete this event?');"><i class="fas fa-trash"></i></a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(events)}">
                    <td colspan="6" style="text-align: center; padding: 20px; color: #888;">No events found. Create one!</td>
                </tr>
            </tbody>
        </table>
    </div>

</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
