<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('All Events')}"></head>
<body>

<header th:replace="~{fragments/layout :: header}"></header>

<main class="container page-content">
    
    <div class="section-header" style="flex-direction: column; align-items: flex-start; gap: 20px;">
        <h2>All Events</h2>
        
        <form th:action="@{/events}" method="get" class="filter-form glass-panel" style="display: flex; gap: 15px; width: 100%; align-items: center; padding: 20px;">
            <input type="text" name="search" th:value="${search}" placeholder="Search by name..." class="form-control" style="flex: 1;">
            
            <select name="department" class="form-control" style="width: 200px;">
                <option value="">All Departments</option>
                <option value="Computer Science" th:selected="${department == 'Computer Science'}">Computer Science</option>
                <option value="Engineering" th:selected="${department == 'Engineering'}">Engineering</option>
                <option value="Business" th:selected="${department == 'Business'}">Business</option>
                <option value="Arts" th:selected="${department == 'Arts'}">Arts</option>
                <option value="Fine Arts" th:selected="${department == 'Fine Arts'}">Fine Arts</option>
                <option value="University Wide" th:selected="${department == 'University Wide'}">University Wide</option>
            </select>

            <select name="type" class="form-control" style="width: 200px;">
                <option value="">All Types</option>
                <option value="Seminar" th:selected="${type == 'Seminar'}">Seminar</option>
                <option value="Workshop" th:selected="${type == 'Workshop'}">Workshop</option>
                <option value="Exhibition" th:selected="${type == 'Exhibition'}">Exhibition</option>
                <option value="Symposium" th:selected="${type == 'Symposium'}">Symposium</option>
            </select>

            <button type="submit" class="btn-primary">Apply Filters</button>
            <a th:href="@{/events}" class="btn-outline">Clear</a>
        </form>
    </div>

    <div class="events-grid" th:if="${not #lists.isEmpty(events)}">
        <div class="event-card" th:each="event : ${events}">
            <div class="card-header">
                <span class="badge" th:text="${event.type}">Type</span>
                <span class="date"><i class="far fa-calendar"></i> <span th:text="${#temporals.format(event.eventDate, 'MMM dd, yyyy')}">Date</span></span>
            </div>
            <div class="card-body">
                <h3 th:text="${event.title}">Event Title</h3>
                <p class="dept"><i class="fas fa-building"></i> <span th:text="${event.department}">Department</span></p>
                <p class="desc" th:text="${#strings.abbreviate(event.description, 100)}">Description...</p>
            </div>
            <div class="card-footer">
                <div class="capacity-info">
                    <i class="fas fa-users"></i>
                    <span th:text="${event.registeredCount} + ' / ' + ${event.capacity}">0/100</span>
                </div>
                <a th:href="@{/event/{id}(id=${event.id})}" class="btn-primary">Details</a>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(events)}" class="empty-state">
        <i class="fas fa-box-open fa-4x"></i>
        <h3>No events found</h3>
        <p>Try adjusting your search filters.</p>
    </div>

</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
