<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body>

<header th:replace="~{fragments/layout :: header}"></header>

<main class="container page-content" style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    
    <div class="glass-panel" style="max-width: 400px; width: 100%;">
        <div style="text-align: center; margin-bottom: 30px;">
            <h2><i class="fas fa-sign-in-alt"></i> Welcome Back</h2>
            <p>Login to manage your events.</p>
        </div>

        <div th:if="${param.error}" class="alert alert-error" style="margin-bottom: 20px;">
            <i class="fas fa-exclamation-circle"></i> Invalid username or password.
        </div>
        
        <div th:if="${param.logout}" class="alert alert-success" style="margin-bottom: 20px;">
            <i class="fas fa-check-circle"></i> You have been logged out.
        </div>

        <div th:if="${param.registered}" class="alert alert-success" style="margin-bottom: 20px;">
            <i class="fas fa-check-circle"></i> Registration successful! Please log in.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username / Student ID</label>
                <div class="input-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" name="username" class="form-control" required style="padding-left: 40px;">
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" class="form-control" required style="padding-left: 40px;">
                </div>
            </div>
            
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Login</button>
        </form>

        <div style="text-align: center; margin-top: 20px;">
            <p>Don't have an account? <a th:href="@{/register}" style="color: var(--primary);">Register here</a></p>
        </div>
    </div>

</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
