<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Home')}"></head>
<body>

<header th:replace="~{fragments/layout :: header}"></header>

<main class="container page-content">
    
    <div class="hero-section">
        <div class="hero-content">
            <h1>Discover Campus <span>Events</span></h1>
            <p>Join workshops, seminars, and exhibitions to enhance your campus experience. Register for events to earn reward points!</p>
            <div class="hero-actions" style="margin-top: 20px;">
                <a th:href="@{/events}" class="btn-primary">Browse All Events</a>
            </div>
        </div>
        <div class="hero-image">
            <i class="fas fa-calendar-alt fa-8x" style="color: rgba(255,255,255,0.8);"></i>
        </div>
    </div>

    <div class="section-header">
        <h2>Upcoming Events</h2>
    </div>

    <div class="events-grid" th:if="${not #lists.isEmpty(events)}">
        <div class="event-card" th:each="event : ${events}">
            <div class="card-header">
                <span class="badge" th:text="${event.type}">Type</span>
                <span class="date"><i class="far fa-calendar"></i> <span th:text="${#temporals.format(event.eventDate, 'MMM dd, yyyy')}">Date</span></span>
            </div>
            <div class="card-body">
                <h3 th:text="${event.title}">Event Title</h3>
                <p class="dept"><i class="fas fa-building"></i> <span th:text="${event.department}">Department</span></p>
                <p class="desc" th:text="${#strings.abbreviate(event.description, 100)}">Description...</p>
            </div>
            <div class="card-footer">
                <div class="capacity-info">
                    <i class="fas fa-users"></i>
                    <span th:text="${event.registeredCount} + ' / ' + ${event.capacity}">0/100</span>
                </div>
                <a th:href="@{/event/{id}(id=${event.id})}" class="btn-primary">Details</a>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(events)}" class="empty-state">
        <i class="fas fa-box-open fa-4x"></i>
        <h3>No events found</h3>
        <p>Check back later for new events.</p>
    </div>

</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
