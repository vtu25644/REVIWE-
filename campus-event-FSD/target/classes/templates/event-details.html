<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${event.title})}"></head>
<body>

<header th:replace="~{fragments/layout :: header}"></header>

<main class="container page-content">
    
    <div class="glass-panel">
        
        <div class="alert alert-error" th:if="${error}">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
        </div>
        
        <div class="alert alert-success" th:if="${successMessage}">
            <i class="fas fa-check-circle"></i> <span th:text="${successMessage}"></span>
        </div>

        <div style="display: flex; gap: 40px; flex-wrap: wrap;">
            
            <div style="flex: 2; min-width: 300px;">
                <div style="margin-bottom: 20px;">
                    <span class="badge" th:text="${event.type}" style="font-size: 1.1rem;">Type</span>
                    <h1 th:text="${event.title}" style="margin: 10px 0; color: var(--text-color);">Title</h1>
                    <p class="dept" style="font-size: 1.2rem; color: var(--primary);"><i class="fas fa-building"></i> <span th:text="${event.department}">Dept</span></p>
                </div>
                
                <div class="event-meta" style="display: flex; gap: 20px; margin-bottom: 30px; font-size: 1.1rem;">
                    <div><i class="far fa-calendar-alt"></i> <span th:text="${#temporals.format(event.eventDate, 'MMM dd, yyyy HH:mm')}">Date</span></div>
                    <div><i class="fas fa-users"></i> <span th:text="${event.registeredCount} + ' / ' + ${event.capacity} + ' Registered'"></span></div>
                </div>

                <h3>About the Event</h3>
                <p style="line-height: 1.8; margin-top: 15px;" th:text="${event.description}">Description</p>
            </div>
            
            <div style="flex: 1; min-width: 300px;">
                <div class="glass-panel" style="background: rgba(255, 255, 255, 0.05);">
                    <h3 style="margin-top: 0;">Registration</h3>
                    <p>Secure your spot and earn 10 points!</p>
                    
                    <div th:if="${isFull}" class="alert alert-error" style="margin-top: 20px;">
                        <i class="fas fa-ban"></i> Event Full
                    </div>

                    <form th:unless="${isFull}" th:action="@{/register-event}" method="post" style="margin-top: 20px;">
                        <input type="hidden" name="eventId" th:value="${event.id}">
                        <button type="submit" class="btn-primary" style="width: 100%;">Register Now & Pay</button>
                    </form>
                </div>
            </div>

        </div>
    </div>

</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
